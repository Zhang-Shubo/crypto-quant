<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>策略汇总 · crypto-quant 回测</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0a0e14; --panel:#111722; --panel2:#0d1320; --line:#1e2937;
    --txt:#d6e0ee; --dim:#7d8aa0; --accent:#3fb6ff;
    --up:#22c55e; --down:#ef4444; --gold:#f5b94a; --violet:#a78bfa;
    --mono:"SF Mono",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5}
  .wrap{max-width:1180px;margin:0 auto;padding:28px 22px 60px}
  header{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:4px}
  h1{font-size:22px;font-weight:650;margin:0;letter-spacing:.2px}
  .sub{color:var(--dim);font-size:13px}
  .intro{margin:14px 0 24px;color:var(--dim);font-size:13.5px;max-width:880px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:18px;margin-bottom:20px}
  .panel h2{font-size:13px;font-weight:600;color:var(--dim);margin:0 0 14px;text-transform:uppercase;letter-spacing:.6px;
    display:flex;justify-content:space-between;align-items:center}
  .toggle{display:flex;gap:6px}
  .toggle button{background:var(--panel2);color:var(--dim);border:1px solid var(--line);border-radius:7px;
    font-size:12px;padding:4px 11px;cursor:pointer}
  .toggle button.on{background:var(--accent);color:#04121f;border-color:var(--accent);font-weight:650}
  .chartbox{position:relative;height:340px}
  .pos{color:var(--up)} .neg{color:var(--down)} .mono{font-family:var(--mono)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:right;color:var(--dim);font-weight:500;font-size:11px;text-transform:uppercase;
    letter-spacing:.4px;padding:9px 11px;border-bottom:1px solid var(--line);white-space:nowrap}
  th:first-child,td:first-child{text-align:left}
  td{padding:11px;border-bottom:1px solid var(--panel2);font-family:var(--mono);white-space:nowrap}
  tbody tr{cursor:pointer}
  tbody tr:hover{background:var(--panel2)}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:8px;vertical-align:middle}
  .stratname{font-family:inherit;font-weight:600}
  .pill{font-size:11px;padding:1px 8px;border-radius:5px;border:1px solid var(--line);font-family:inherit}
  .pill.long{color:var(--up);border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.07)}
  .pill.short{color:var(--down);border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.07)}
  .exits{font-size:11px;color:var(--dim)}
  .arrow{color:var(--dim)}
  tbody tr:hover .arrow{color:var(--accent)}
  .foot{color:var(--dim);font-size:12px;margin-top:8px;line-height:1.7}
  .foot code{font-family:var(--mono);background:var(--panel2);padding:1px 6px;border-radius:4px;color:var(--txt)}
  .err{padding:40px;text-align:center;color:var(--dim)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>策略汇总 · 涨幅榜回测</h1>
    <span class="sub" id="meta"></span>
  </header>
  <div class="intro" id="intro"></div>

  <div class="panel">
    <h2>净值对比
      <span class="toggle">
        <button id="btnRet" class="on">归一化收益 %</button>
        <button id="btnLog">净值 (对数)</button>
      </span>
    </h2>
    <div class="chartbox"><canvas id="cmpChart"></canvas></div>
  </div>

  <div class="panel">
    <h2>策略对比 (点击查看明细)</h2>
    <table>
      <thead><tr>
        <th>策略</th><th>方向</th><th>止损/止盈</th><th>总收益</th><th>期末净值</th>
        <th>最大回撤</th><th>夏普</th><th>胜率</th><th>离场 SL/TP/时间</th><th></th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
  <div class="foot" id="foot"></div>
</div>

<script>
const fmt=(n,d=2)=>Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const sign=n=>(n>=0?'+':'')+fmt(n);
const tdate=ms=>{const d=new Date(ms);const p=x=>String(x).padStart(2,'0');return `${p(d.getMonth()+1)}-${p(d.getDate())}`;};
const PALETTE=['#3fb6ff','#22c55e','#ef4444','#f5b94a','#a78bfa','#2dd4bf','#fb7185','#facc15'];

let manifest=null, curves={}, mode='ret', chart=null;

fetch('./runs/manifest.json')
  .then(r=>{if(!r.ok)throw 0;return r.json();})
  .then(async m=>{
    manifest=m;
    if(!m.runs||!m.runs.length){throw 0;}
    // 拉每个 run 的曲线
    await Promise.all(m.runs.map(async run=>{
      try{const r=await fetch(`./runs/${run.id}.json`); if(r.ok){const j=await r.json(); curves[run.id]=j.curve;}}catch(e){}
    }));
    renderAll();
  })
  .catch(()=>{
    document.querySelector('.wrap').innerHTML =
      `<div class="err">还没有回测结果。<br/>在服务器跑 <code>python3 backtest/short_gainers.py --batch</code> 生成 runs/ 后刷新。</div>`;
  });

function renderAll(){
  const runs=manifest.runs;
  const best=runs[0];
  document.getElementById('meta').textContent =
    `${runs.length} 个策略 · 标的池 ${best.universe_effective} · ${best.days}天 · 每${best.rebalance_hours}h调仓`;
  document.getElementById('intro').innerHTML =
    `同一标的池、同一区间下，对「每${best.rebalance_hours}h 取 24h 涨幅榜前 ${best.top_n}」做不同<b>方向</b>（做多/做空）与不同<b>止损/止盈</b>参数的回测对比。`+
    `当前最佳：<b class="${best.total_return_pct>=0?'pos':'neg'}">${best.label}</b>（${sign(best.total_return_pct)}%）。`+
    `<br/>⚠️ 均为单一历史窗口、未计滑点/爆仓，高收益大概率含 regime 偏差，需更长样本与基准对比验证。`;

  // 表格
  document.getElementById('rows').innerHTML = runs.map((r,i)=>{
    const col=PALETTE[i%PALETTE.length];
    const ex=`${r.exit_sl_pct}/${r.exit_tp_pct}/${r.exit_time_pct}`;
    return `<tr onclick="location.href='run.html?id=${r.id}'">
      <td><span class="dot" style="background:${col}"></span><span class="stratname">${r.label}</span></td>
      <td><span class="pill ${r.side}">${r.side==='long'?'做多':'做空'}</span></td>
      <td>${(r.stop_loss*100).toFixed(0)}% / ${(r.take_profit*100).toFixed(0)}%</td>
      <td class="${r.total_return_pct>=0?'pos':'neg'}">${sign(r.total_return_pct)}%</td>
      <td>${fmt(r.final_equity)}</td>
      <td class="neg">${r.max_drawdown_pct}%</td>
      <td class="${r.sharpe>=0?'pos':'neg'}">${r.sharpe}</td>
      <td>${r.win_rate_pct}%</td>
      <td class="exits">${ex}</td>
      <td class="arrow">明细 →</td>
    </tr>`;
  }).join('');

  document.getElementById('foot').innerHTML =
    `数据: Binance USDT 永续 (首尔直连)。每个策略=方向×止损止盈参数，由 <code>backtest/short_gainers.py --batch</code> 生成 <code>runs/&lt;id&gt;.json</code> + <code>manifest.json</code>。点策略行进入回放明细。`;

  drawChart();
}

function drawChart(){
  Chart.defaults.color='#7d8aa0'; Chart.defaults.font.family=getComputedStyle(document.body).fontFamily;
  const runs=manifest.runs;
  // 用曲线最长的作为标签轴
  let base=null;
  runs.forEach(r=>{const c=curves[r.id]; if(c&&(!base||c.length>base.length))base=c;});
  if(!base){return;}
  const labels=base.map(p=>tdate(p.time));
  const datasets=runs.map((r,i)=>{
    const c=curves[r.id]||[]; const col=PALETTE[i%PALETTE.length];
    const data=c.map(p=> mode==='ret' ? (p.equity/r.start_equity-1)*100 : p.equity);
    return {label:r.label,data,borderColor:col,backgroundColor:col,borderWidth:1.6,pointRadius:0,tension:.12};
  });
  const cfg={
    type:'line',
    data:{labels,datasets},
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      interaction:{intersect:false,mode:'index'},
      plugins:{legend:{display:true,labels:{boxWidth:10,boxHeight:10,usePointStyle:true,padding:14,font:{size:12}}},
        tooltip:{callbacks:{label:c=> ' '+c.dataset.label+' '+(mode==='ret'?sign(c.parsed.y)+'%':fmt(c.parsed.y))}}},
      scales:{x:{grid:{color:'#1a2230'},ticks:{maxTicksLimit:9,autoSkip:true}},
        y: mode==='log'
          ? {type:'logarithmic',grid:{color:'#1a2230'},ticks:{callback:v=>fmt(v,0)}}
          : {grid:{color:'#1a2230'},ticks:{callback:v=>sign(v)+'%'}}}}
  };
  if(chart)chart.destroy();
  chart=new Chart(document.getElementById('cmpChart'),cfg);
}

document.getElementById('btnRet').onclick=()=>{mode='ret';setToggle();drawChart();};
document.getElementById('btnLog').onclick=()=>{mode='log';setToggle();drawChart();};
function setToggle(){
  document.getElementById('btnRet').classList.toggle('on',mode==='ret');
  document.getElementById('btnLog').classList.toggle('on',mode==='log');
}
</script>
</body>
</html>
