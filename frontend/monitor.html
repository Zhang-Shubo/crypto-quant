<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>实时监控 · dry-run</title>
<style>
  :root{
    --bg:#0a0e14; --panel:#111722; --panel2:#0d1320; --line:#1e2937;
    --txt:#d6e0ee; --dim:#7d8aa0; --accent:#3fb6ff;
    --up:#22c55e; --down:#ef4444; --gold:#f5b94a;
    --mono:"SF Mono",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5}
  .wrap{max-width:1040px;margin:0 auto;padding:24px 20px 60px}
  header{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  h1{font-size:20px;font-weight:650;margin:0}
  .tag{font-family:var(--mono);font-size:11px;color:var(--accent);border:1px solid var(--line);
    border-radius:6px;padding:2px 8px;background:var(--panel2)}
  .live{margin-left:auto;font-size:12px;color:var(--dim);display:flex;align-items:center;gap:7px}
  .pulse{width:8px;height:8px;border-radius:50%;background:var(--up);animation:bl 1.4s infinite}
  @keyframes bl{0%,100%{opacity:1}50%{opacity:.25}}
  .summary{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0 20px}
  .scard{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 16px;min-width:150px}
  .scard .k{color:var(--dim);font-size:12px;margin-bottom:3px}
  .scard .v{font-family:var(--mono);font-size:20px;font-weight:600}
  .pos{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:15px 17px;margin-bottom:12px}
  .pr{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .sym{font-size:16px;font-weight:650;font-family:var(--mono)}
  .pill{font-size:11px;padding:1px 8px;border-radius:5px;border:1px solid var(--line);font-family:var(--mono)}
  .pill.long{color:var(--up);border-color:rgba(34,197,94,.4)}
  .pill.short{color:var(--down);border-color:rgba(239,68,68,.4)}
  .pill.gold{color:var(--gold);border-color:rgba(245,185,74,.4)}
  .st{margin-left:auto;font-size:13px;font-family:var(--mono);font-weight:600}
  .prices{display:flex;gap:22px;flex-wrap:wrap;font-family:var(--mono);font-size:13px;margin-bottom:14px}
  .prices .lab{color:var(--dim);font-size:11px;margin-right:5px}
  .pos{color:var(--up)} .neg{color:var(--down)} .mono{font-family:var(--mono)}
  .gauge{position:relative;height:10px;border-radius:6px;margin:24px 6px 30px;
    background:linear-gradient(90deg,rgba(239,68,68,.55),rgba(125,138,160,.25),rgba(34,197,94,.55))}
  .gauge.rev{background:linear-gradient(90deg,rgba(34,197,94,.55),rgba(125,138,160,.25),rgba(239,68,68,.55))}
  .mk{position:absolute;top:50%;transform:translate(-50%,-50%);font-size:10px;font-family:var(--mono);white-space:nowrap}
  .mk .cap{position:absolute;left:50%;transform:translateX(-50%);bottom:14px;color:var(--dim)}
  .mk.end{top:50%}
  .endlab{position:absolute;bottom:-22px;transform:translateX(-50%);font-size:10px;font-family:var(--mono);white-space:nowrap}
  .tick{position:absolute;top:50%;transform:translate(-50%,-50%);width:2px;height:18px;background:var(--dim);border-radius:2px}
  .dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:13px;height:13px;border-radius:50%;
    border:2px solid #0a0e14;box-shadow:0 0 0 1px currentColor}
  .meta{display:flex;gap:20px;flex-wrap:wrap;font-family:var(--mono);font-size:12.5px}
  .meta .lab{color:var(--dim);font-size:11px;margin-right:5px}
  .foot{color:var(--dim);font-size:12px;margin-top:18px;line-height:1.7}
  .err{padding:30px;text-align:center;color:var(--down)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 id="h1">实时监控</h1>
    <span class="tag" id="tag"></span>
    <span class="tag" id="frozen"></span>
    <span class="live"><span class="pulse"></span><span id="upd">连接中…</span></span>
  </header>
  <div class="summary" id="summary"></div>
  <div id="list"></div>
  <div class="foot" id="foot"></div>
</div>
<script>
const fmt=(n,d=2)=>Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const sign=(n,d=2)=>(n>=0?'+':'')+fmt(n,d);
const g=n=>Number(n).toPrecision(6).replace(/\.?0+$/,'');
const clamp=(x,a,b)=>Math.max(a,Math.min(b,x));
const hhmmss=ms=>{const d=new Date(ms);const p=x=>String(x).padStart(2,'0');return `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;};

let SIDE='long';

async function tick(){
  let st;
  try{ const r=await fetch('./api/state',{cache:'no-store'}); st=await r.json(); }
  catch(e){ document.getElementById('upd').textContent='连接失败,重试中'; return; }
  if(st.error){ document.getElementById('list').innerHTML=`<div class="err">${st.error}</div>`; return; }
  render(st);
}

function render(st){
  const P=st.plan, px=st.prices, dir=P.side==='long'?1:-1; SIDE=P.side;
  const sideCn=P.side==='long'?'做多':'做空';
  document.getElementById('h1').textContent=`实时监控 · ${sideCn}涨幅榜`;
  document.getElementById('tag').textContent=`${sideCn}top${P.top} · 止损${(P.sl*100).toFixed(0)}% · 止盈${(P.tp*100).toFixed(0)}% · 每仓${fmt(P.notional_each)}U`;
  document.getElementById('frozen').textContent=`冻结于 ${hhmmss(P.frozen_at)}`;
  document.getElementById('upd').textContent=`更新于 ${hhmmss(st.now)}`;

  let totPnl=0, totNotional=0, hit=0;
  const cards=P.positions.map(p=>{
    const cur=px[p.symbol];
    if(cur==null) return `<div class="pos"><div class="pr"><span class="sym">${p.symbol}</span><span class="st">无行情</span></div></div>`;
    const pnl=p.qty*(cur-p.entry)*dir, pnlPct=(cur-p.entry)/p.entry*dir*100;
    totPnl+=pnl; totNotional+=p.qty*p.entry;
    const toSL=(p.sl/cur-1)*100, toTP=(p.tp/cur-1)*100;
    const lo=Math.min(p.sl,p.tp), hi=Math.max(p.sl,p.tp);
    const posPct=clamp((cur-lo)/(hi-lo),0,1)*100, entPct=clamp((p.entry-lo)/(hi-lo),0,1)*100;
    // 触发判定
    let status,scls;
    if(P.side==='long'){ if(cur<=p.sl){status='已触止损';scls='neg';hit++} else if(cur>=p.tp){status='已触止盈';scls='pos';hit++} else {status='持仓中';scls='mono'} }
    else { if(cur>=p.sl){status='已触止损';scls='neg';hit++} else if(cur<=p.tp){status='已触止盈';scls='pos';hit++} else {status='持仓中';scls='mono'} }
    // 端点: 左=lo价 右=hi价; 标注哪端是SL/TP
    const leftIsSL = (lo===p.sl);
    const revClass = leftIsSL ? '' : 'rev'; // 默认渐变左红(止损)右绿(止盈); 若左端是止盈则反转
    const leftLab = leftIsSL?`止损 ${g(p.sl)}`:`止盈 ${g(p.tp)}`;
    const rightLab= leftIsSL?`止盈 ${g(p.tp)}`:`止损 ${g(p.sl)}`;
    const leftCls = leftIsSL?'neg':'pos', rightCls=leftIsSL?'pos':'neg';
    return `<div class="pos">
      <div class="pr">
        <span class="sym">${p.symbol}</span>
        <span class="pill ${P.side}">${sideCn}</span>
        <span class="pill gold">24h +${fmt(p.chg24,1)}%</span>
        <span class="st ${scls}">${status}　<span class="${pnl>=0?'pos':'neg'}">${sign(pnl)}U (${sign(pnlPct)}%)</span></span>
      </div>
      <div class="prices">
        <span><span class="lab">入场</span>${g(p.entry)}</span>
        <span><span class="lab">现价(标记)</span><b class="${pnl>=0?'pos':'neg'}">${g(cur)}</b></span>
        <span><span class="lab">数量</span>${g(p.qty)}</span>
      </div>
      <div class="gauge ${revClass}">
        <span class="endlab ${leftCls}" style="left:0">${leftLab}</span>
        <span class="endlab ${rightCls}" style="left:100%">${rightLab}</span>
        <span class="tick" style="left:${entPct}%"><span class="mk"><span class="cap">入场</span></span></span>
        <span class="dot" style="left:${posPct}%;color:${pnl>=0?'var(--up)':'var(--down)'};background:${pnl>=0?'var(--up)':'var(--down)'}"></span>
      </div>
      <div class="meta">
        <span><span class="lab">距止损</span><b class="neg">${sign(toSL)}%</b></span>
        <span><span class="lab">距止盈</span><b class="pos">${sign(toTP)}%</b></span>
        <span><span class="lab">浮盈</span><b class="${pnl>=0?'pos':'neg'}">${sign(pnl)} U</b></span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('list').innerHTML=cards || '<div class="err">无监控标的</div>';

  document.getElementById('summary').innerHTML=
    `<div class="scard"><div class="k">投入名义</div><div class="v">${fmt(totNotional)} U</div></div>`+
    `<div class="scard"><div class="k">合计浮盈</div><div class="v ${totPnl>=0?'pos':'neg'}">${sign(totPnl)} U</div></div>`+
    `<div class="scard"><div class="k">浮盈率</div><div class="v ${totPnl>=0?'pos':'neg'}">${sign(totNotional?totPnl/totNotional*100:0)}%</div></div>`+
    `<div class="scard"><div class="k">触发</div><div class="v">${hit} / ${P.positions.length}</div></div>`;
}

document.getElementById('foot').innerHTML=
  '⚠️ 这是 <b>dry-run 监控</b>: 入场/止损/止盈为服务启动时按实时涨幅榜冻结的快照, 现价为 Binance 实时标记价(markPrice, 与真实触发同口径)。<b>不下任何单</b>, 不影响账户。重启监控服务可按当前行情重新冻结一组。';

tick();
setInterval(tick,3000);
</script>
</body>
</html>
