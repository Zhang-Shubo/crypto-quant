<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>实时策略 · crypto-quant</title>
<link rel="stylesheet" href="./app.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  .summary{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
  .scard{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 16px;min-width:140px}
  .scard .k{color:var(--dim);font-size:12px;margin-bottom:3px}
  .scard .v{font-family:var(--mono);font-size:20px;font-weight:600}
  .chartbox{position:relative;height:220px}
  .poscard{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:15px 17px;margin-bottom:12px}
  .pr{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .sym{font-size:16px;font-weight:650;font-family:var(--mono)}
  .st{margin-left:auto;font-size:13px;font-family:var(--mono);font-weight:600}
  .prices{display:flex;gap:22px;flex-wrap:wrap;font-family:var(--mono);font-size:13px;margin-bottom:14px}
  .prices .lab{color:var(--dim);font-size:11px;margin-right:5px}
  .gauge{position:relative;height:10px;border-radius:6px;margin:8px 6px 30px;
    background:linear-gradient(90deg,rgba(239,68,68,.55),rgba(125,138,160,.25),rgba(34,197,94,.55))}
  .gauge.rev{background:linear-gradient(90deg,rgba(34,197,94,.55),rgba(125,138,160,.25),rgba(239,68,68,.55))}
  .endlab{position:absolute;bottom:-22px;transform:translateX(-50%);font-size:10px;font-family:var(--mono);white-space:nowrap}
  .tick{position:absolute;top:50%;transform:translate(-50%,-50%);width:2px;height:18px;background:var(--dim);border-radius:2px}
  .tick .cap{position:absolute;left:50%;transform:translateX(-50%);bottom:13px;color:var(--dim);font-size:10px;font-family:var(--mono)}
  .dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:13px;height:13px;border-radius:50%;border:2px solid #0a0e14}
  .meta{display:flex;gap:20px;flex-wrap:wrap;font-family:var(--mono);font-size:12.5px}
  .meta .lab{color:var(--dim);font-size:11px;margin-right:5px}
  .foot{color:var(--dim);font-size:12px;margin-top:18px;line-height:1.7}
</style>
</head>
<body>
<nav class="topnav">
  <span class="brand"><b>⚡</b> crypto-quant</span>
  <a href="index.html">市场</a>
  <a href="backtest.html">回测</a>
  <a href="live.html" class="active">实时</a>
  <span class="live"><span class="pulse"></span><span id="upd">连接中…</span></span>
</nav>
<div class="wrap">
  <h1 id="h1">实时策略运行</h1>
  <div class="sub" id="sub"></div>

  <div class="summary" id="summary" style="margin-top:16px"></div>

  <div class="panel">
    <h2>浮盈历史 (持久化 · SQLite 采样)</h2>
    <div class="chartbox"><canvas id="pnlChart"></canvas></div>
  </div>

  <div id="list"></div>
  <div class="foot" id="foot"></div>
</div>
<script>
const fmt=(n,d=2)=>Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const sign=(n,d=2)=>(n>=0?'+':'')+fmt(n,d);
const g=n=>Number(n).toPrecision(6).replace(/\.?0+$/,'');
const clamp=(x,a,b)=>Math.max(a,Math.min(b,x));
const hm=ms=>{const d=new Date(ms);const p=x=>String(x).padStart(2,'0');return `${p(d.getHours())}:${p(d.getMinutes())}`;};
const hhmmss=ms=>{const d=new Date(ms);const p=x=>String(x).padStart(2,'0');return `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;};

async function tickMonitor(){
  let st;
  try{ st=await (await fetch('./api/monitor',{cache:'no-store'})).json(); }
  catch(e){ document.getElementById('upd').textContent='连接失败,重试'; return; }
  renderMonitor(st);
}
function renderMonitor(st){
  const P=st.plan, px=st.prices, dir=P.side==='long'?1:-1, sideCn=P.side==='long'?'做多':'做空';
  const poolTxt = P.pool==='quality'
    ? `质量池(上市≥${P.quality_age_months}月·成交额>${(P.quality_vol/1e4).toFixed(0)}万)`
    : '涨幅榜';
  document.getElementById('h1').textContent=`实时策略运行 · ${sideCn}${poolTxt}`;
  document.getElementById('sub').textContent=
    `${sideCn} top${P.top} · ${poolTxt} · 止损${(P.sl*100).toFixed(0)}% · 止盈${(P.tp*100).toFixed(0)}% · 每仓${fmt(P.notional_each)}U · 冻结于 ${P.frozen_at?hhmmss(P.frozen_at):'—'} · 快照#${st.snapshot_id||'—'}`;
  document.getElementById('upd').textContent='更新 '+hhmmss(st.now);

  const s=st.summary||{total_pnl:0,total_notional:0,hit:0};
  document.getElementById('summary').innerHTML=
    `<div class="scard"><div class="k">投入名义</div><div class="v">${fmt(s.total_notional)} U</div></div>`+
    `<div class="scard"><div class="k">合计浮盈</div><div class="v ${s.total_pnl>=0?'pos':'neg'}">${sign(s.total_pnl)} U</div></div>`+
    `<div class="scard"><div class="k">浮盈率</div><div class="v ${s.total_pnl>=0?'pos':'neg'}">${sign(s.total_notional?s.total_pnl/s.total_notional*100:0)}%</div></div>`+
    `<div class="scard"><div class="k">已平仓</div><div class="v">${s.hit} / ${P.positions.length}</div></div>`;

  document.getElementById('list').innerHTML=P.positions.map(p=>{
    const closed=p.closed, cur=px[p.symbol];
    const ref = closed ? p.exit : cur;        // 已平: 盈亏定格在出场价
    if(ref==null) return `<div class="poscard"><div class="pr"><span class="sym">${p.symbol}</span><span class="st">无行情</span></div></div>`;
    const pnl=p.qty*(ref-p.entry)*dir, pnlPct=(ref-p.entry)/p.entry*dir*100;
    const lo=Math.min(p.sl,p.tp), hi=Math.max(p.sl,p.tp);
    const posPct=clamp((ref-lo)/(hi-lo),0,1)*100, entPct=clamp((p.entry-lo)/(hi-lo),0,1)*100;
    const status = closed ? (p.reason==='SL'?'已止损 · 平仓':'已止盈 · 平仓') : '持仓中';
    const scls = closed ? (p.reason==='SL'?'neg':'pos') : 'mono';
    const leftIsSL=(lo===p.sl), revClass=leftIsSL?'':'rev';
    const leftLab=leftIsSL?`止损 ${g(p.sl)}`:`止盈 ${g(p.tp)}`, rightLab=leftIsSL?`止盈 ${g(p.tp)}`:`止损 ${g(p.sl)}`;
    const leftCls=leftIsSL?'neg':'pos', rightCls=leftIsSL?'pos':'neg';
    const card=closed?'border-color:'+(p.reason==='SL'?'rgba(239,68,68,.4)':'rgba(34,197,94,.4)'):'';
    const bottom = closed
      ? `<span><span class="lab">出场(已平)</span><b class="${p.reason==='SL'?'neg':'pos'}">${g(p.exit)}</b> @ ${p.exit_ts?hhmmss(p.exit_ts):''}</span>
         <span><span class="lab">已实现</span><b class="${pnl>=0?'pos':'neg'}">${sign(pnl)} U</b></span>`
      : `<span><span class="lab">距止损</span><b class="neg">${sign((p.sl/cur-1)*100)}%</b></span>
         <span><span class="lab">距止盈</span><b class="pos">${sign((p.tp/cur-1)*100)}%</b></span>
         <span><span class="lab">浮盈</span><b class="${pnl>=0?'pos':'neg'}">${sign(pnl)} U</b></span>`;
    return `<div class="poscard" style="${card}">
      <div class="pr"><span class="sym">${p.symbol}</span>
        <span class="pill ${P.side}">${sideCn}</span>
        <span class="pill gold">24h +${fmt(p.chg24,1)}%</span>
        <span class="st ${scls}">${status}　<span class="${pnl>=0?'pos':'neg'}">${sign(pnl)}U (${sign(pnlPct)}%)</span></span></div>
      <div class="prices">
        <span><span class="lab">入场</span>${g(p.entry)}</span>
        <span><span class="lab">${closed?'出场价':'现价(标记)'}</span><b class="${pnl>=0?'pos':'neg'}">${g(ref)}</b></span>
        <span><span class="lab">数量</span>${g(p.qty)}</span></div>
      <div class="gauge ${revClass}" style="${closed?'opacity:.6':''}">
        <span class="endlab ${leftCls}" style="left:0">${leftLab}</span>
        <span class="endlab ${rightCls}" style="left:100%">${rightLab}</span>
        <span class="tick" style="left:${entPct}%"><span class="cap">入场</span></span>
        <span class="dot" style="left:${posPct}%;background:${pnl>=0?'var(--up)':'var(--down)'};box-shadow:0 0 0 1px ${pnl>=0?'var(--up)':'var(--down)'}"></span>
      </div>
      <div class="meta">${bottom}</div></div>`;
  }).join('') || '<div class="foot">无监控标的</div>';
}

let chart=null;
async function loadHistory(){
  let h;
  try{ h=await (await fetch('./api/monitor/history',{cache:'no-store'})).json(); }catch(e){ return; }
  const s=h.samples||[];
  const labels=s.map(x=>hm(x.ts)), data=s.map(x=>x.total_pnl);
  if(!chart){
    Chart.defaults.color='#7d8aa0';
    chart=new Chart(document.getElementById('pnlChart'),{
      type:'line',
      data:{labels,datasets:[{label:'浮盈U',data,borderColor:'#3fb6ff',borderWidth:1.6,pointRadius:0,
        fill:true,tension:.15,
        backgroundColor:ctx=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,220);
          g.addColorStop(0,'rgba(63,182,255,.20)');g.addColorStop(1,'rgba(63,182,255,0)');return g;}}]},
      options:{responsive:true,maintainAspectRatio:false,animation:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' 浮盈 '+sign(c.parsed.y)+' U'}}},
        scales:{x:{grid:{color:'#1a2230'},ticks:{maxTicksLimit:10,autoSkip:true}},
          y:{grid:{color:'#1a2230'},ticks:{callback:v=>(v>=0?'+':'')+Number(v).toFixed(2)}}}}
    });
  }else{
    chart.data.labels=labels; chart.data.datasets[0].data=data; chart.update();
  }
}

document.getElementById('foot').innerHTML=
  '⚠️ <b>dry-run</b>: 入场/止损/止盈为服务冻结快照, 现价为实时标记价。浮盈每隔采样周期写入 <b>SQLite (data/live.db)</b>, 重启后历史保留。<b>不下任何单</b>。';

tickMonitor(); loadHistory();
setInterval(tickMonitor,3000);
setInterval(loadHistory,30000);
</script>
</body>
</html>
