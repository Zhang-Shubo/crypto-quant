<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>市场 · crypto-quant</title>
<link rel="stylesheet" href="./app.css" />
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
  .layout{display:grid;grid-template-columns:1fr 1.05fr;gap:18px;align-items:start}
  @media(max-width:900px){.layout{grid-template-columns:1fr}}
  .board{max-height:78vh;overflow:auto}
  .updated{font-size:11px;color:var(--dim);font-family:var(--mono);font-weight:400}
  tbody tr.sel{background:rgba(63,182,255,.10);box-shadow:inset 2px 0 0 var(--accent)}
  .khead{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:12px}
  .ksym{font-size:18px;font-weight:700;font-family:var(--mono)}
  .kprice{font-size:18px;font-family:var(--mono)}
  /* 高度按视口自适应: 小屏不挤、大屏更高, 配合 autoSize 宽度自适应 */
  #kchart{height:clamp(300px,52vh,580px);width:100%}
  .kempty{height:clamp(300px,52vh,580px);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:13px}
  .ivals{display:flex;gap:5px}
  .ivals button{background:var(--panel2);color:var(--dim);border:1px solid var(--line);border-radius:6px;
    font-size:12px;padding:3px 10px;cursor:pointer;font-family:var(--mono)}
  .ivals button.on{background:var(--accent);color:#04121f;border-color:var(--accent)}
</style>
</head>
<body>
<nav class="topnav">
  <span class="brand"><b>⚡</b> crypto-quant</span>
  <a href="index.html" class="active">市场</a>
  <a href="backtest.html">回测</a>
  <a href="live.html">实时</a>
  <span class="live"><span class="pulse"></span><span id="upd">加载中…</span></span>
</nav>
<div class="wrap">
  <div class="layout">
    <!-- 涨幅榜 -->
    <div class="panel">
      <h2>合约涨幅榜
        <span class="toggle">
          <button id="w1h" class="">1H</button>
          <button id="w24h" class="on">24H</button>
          <button id="ord" class="">涨/跌</button>
        </span>
      </h2>
      <div class="updated" id="boardupd"></div>
      <div class="board">
        <table>
          <thead><tr><th>#</th><th>标的</th><th>现价</th><th>涨跌%</th><th>24h额</th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
    <!-- K线详情 -->
    <div class="panel">
      <h2>K线详情
        <span class="ivals" id="ivals">
          <button data-iv="15m">15m</button>
          <button data-iv="1h" class="on">1h</button>
          <button data-iv="4h">4h</button>
          <button data-iv="1d">1d</button>
        </span>
      </h2>
      <div class="khead" id="khead"><span class="dim">← 点左侧标的查看 K 线</span></div>
      <div id="kchart"></div>
      <div class="kempty" id="kempty">选择一个标的</div>
    </div>
  </div>
</div>
<script>
const fmt=(n,d=2)=>Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const g=n=>{const a=Math.abs(n);const d=a>=100?2:a>=1?4:6;return Number(n).toPrecision(8).replace(/\.?0+$/,'')||'0';};
const vol=v=>v>=1e9?(v/1e9).toFixed(2)+'B':v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':v.toFixed(0);
const hhmmss=ms=>{const d=new Date(ms);const p=x=>String(x).padStart(2,'0');return `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;};

let win='24h', order='desc', curSym=null, curIv='1h';

async function loadBoard(){
  try{
    const r=await fetch(`./api/gainers?window=${win}&order=${order}&top=40`,{cache:'no-store'});
    const d=await r.json();
    document.getElementById('upd').textContent='更新 '+hhmmss(Date.now());
    document.getElementById('boardupd').textContent=`${win.toUpperCase()} 榜 · 数据更新于 ${d.updated?hhmmss(d.updated):'—'}`;
    document.getElementById('rows').innerHTML=d.rows.map((x,i)=>{
      const c=x.chg>=0?'pos':'neg';
      return `<tr data-sym="${x.symbol}" class="${x.symbol===curSym?'sel':''}">
        <td class="dim">${i+1}</td>
        <td style="font-weight:600">${x.symbol}</td>
        <td>${g(x.price)}</td>
        <td class="${c}">${x.chg>=0?'+':''}${fmt(x.chg)}%</td>
        <td class="dim">${vol(x.qvol)}</td></tr>`;
    }).join('');
    document.querySelectorAll('#rows tr').forEach(tr=>tr.onclick=()=>selectSym(tr.dataset.sym));
  }catch(e){ document.getElementById('upd').textContent='连接失败'; }
}

let chart=null, series=null;
function ensureChart(){
  if(chart||typeof LightweightCharts==='undefined') return;
  chart=LightweightCharts.createChart(document.getElementById('kchart'),{
    layout:{background:{color:'transparent'},textColor:'#7d8aa0'},
    grid:{vertLines:{color:'#1a2230'},horzLines:{color:'#1a2230'}},
    rightPriceScale:{borderColor:'#1e2937'},
    timeScale:{borderColor:'#1e2937',timeVisible:true,rightOffset:4,barSpacing:6},
    crosshair:{mode:0},autoSize:true,           // autoSize: 用 ResizeObserver 跟随容器宽高变化
  });
  // 兜底: 窗口尺寸/DPR 变化时主动重排 (部分环境 ResizeObserver 不触发)
  window.addEventListener('resize',()=>{ if(chart){const el=document.getElementById('kchart');chart.resize(el.clientWidth,el.clientHeight);} });
  series=chart.addCandlestickSeries({upColor:'#22c55e',downColor:'#ef4444',
    borderUpColor:'#22c55e',borderDownColor:'#ef4444',wickUpColor:'#22c55e',wickDownColor:'#ef4444'});
}

async function selectSym(sym){
  curSym=sym;
  document.querySelectorAll('#rows tr').forEach(tr=>tr.classList.toggle('sel',tr.dataset.sym===sym));
  document.getElementById('kempty').style.display='none';
  ensureChart();
  if(!chart){ document.getElementById('kempty').style.display='flex';
    document.getElementById('kempty').textContent='图表库加载失败(检查网络)'; return; }
  try{
    const r=await fetch(`./api/klines?symbol=${sym}&interval=${curIv}&limit=200`,{cache:'no-store'});
    const d=await r.json();
    series.setData(d.candles.map(c=>({time:c.time,open:c.open,high:c.high,low:c.low,close:c.close})));
    chart.timeScale().fitContent();
    const last=d.candles[d.candles.length-1], first=d.candles[0];
    const chg=(last.close/first.open-1)*100;
    document.getElementById('khead').innerHTML=
      `<span class="ksym">${sym}</span>`+
      `<span class="kprice">${g(last.close)}</span>`+
      `<span class="${chg>=0?'pos':'neg'} mono">${chg>=0?'+':''}${fmt(chg)}% (${curIv}×${d.candles.length})</span>`;
  }catch(e){ document.getElementById('kempty').style.display='flex';
    document.getElementById('kempty').textContent='K线加载失败'; }
}

document.getElementById('w1h').onclick=()=>{win='1h';setWin();loadBoard();};
document.getElementById('w24h').onclick=()=>{win='24h';setWin();loadBoard();};
document.getElementById('ord').onclick=function(){order=order==='desc'?'asc':'desc';this.classList.toggle('on',order==='asc');loadBoard();};
function setWin(){document.getElementById('w1h').classList.toggle('on',win==='1h');document.getElementById('w24h').classList.toggle('on',win==='24h');}
document.querySelectorAll('#ivals button').forEach(b=>b.onclick=()=>{
  curIv=b.dataset.iv;document.querySelectorAll('#ivals button').forEach(x=>x.classList.toggle('on',x===b));
  if(curSym)selectSym(curSym);
});

loadBoard();
setInterval(loadBoard,20000);
</script>
</body>
</html>
